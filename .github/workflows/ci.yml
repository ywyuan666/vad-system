name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 vad/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 vad/ --count --max-complexity=10 --max-line-length=100 --statistics

      - name: Type check with mypy
        run: |
          mypy vad/ --ignore-missing-imports --check-untyped-defs || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run import sanity check
        run: |
          python -c "from vad import EnergyVAD, SpectralVAD, DNNVAD; print('All imports OK')"
          python -c "from vad import StreamingVAD, VADEvaluator; print('Streaming + Eval OK')"

      - name: Run synthetic benchmark smoke test
        run: |
          python benchmark/benchmark.py --method synthetic --n_samples 10 --output results
          echo "Benchmark smoke test passed"
